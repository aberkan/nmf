<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Facebook Time Limiter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header class="header">
        <h1 class="title">Facebook time</h1>
        <p class="subtitle">Rolling windows</p>
      </header>

      <section class="stat stat--primary" aria-labelledby="week-label">
        <p id="week-label" class="stat__label">Last 7 days</p>
        <p
          class="stat__value"
          id="week-usage"
          aria-live="polite"
        >
          —
        </p>
      </section>

      <section class="stat" aria-labelledby="last-day-label">
        <p id="last-day-label" class="stat__label">Last day</p>
        <p
          class="stat__value stat__value--secondary"
          id="last-day-usage"
          aria-live="polite"
        >
          —
        </p>
      </section>

      <section class="stat" aria-labelledby="day-label">
        <p id="day-label" class="stat__label">Last 4 hours</p>
        <p
          class="stat__value stat__value--secondary"
          id="day-usage"
          aria-live="polite"
        >
          —
        </p>
      </section>

      <section class="limit" aria-labelledby="limit-label">
        <div class="limit__head">
          <span id="limit-label" class="limit__label">vs 10h daily limit</span>
          <span class="limit__pct" id="limit-pct" aria-hidden="true"></span>
        </div>
        <div
          class="limit__track"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
          aria-labelledby="limit-label"
          id="limit-bar"
        >
          <div class="limit__fill" id="limit-fill"></div>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
